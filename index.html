<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAZER BLADE // PITCH_SHIFT</title>
    <style>
        /* --- 1. FONTS & VARS --- */
        @font-face { font-family: 'NIN'; src: url('nin.ttf') format('truetype'), local('Impact'), sans-serif; font-display: swap; }
        @font-face { font-family: 'DATA'; src: url('data.ttf') format('truetype'), local('Courier New'), monospace; font-display: swap; }
        
        :root { 
            --sz-dark: #050608; 
            --sz-panel: #111215;
            --sz-cyan: #00e5ff; 
            --sz-magenta: #ff00ff;
            --sz-text: #b0bec5;
            --sz-dim: #445566;
        }

        body {
            font-family: 'DATA', monospace; background-color: var(--sz-dark); color: var(--sz-text);
            padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0;
            text-shadow: 0 0 2px rgba(0, 229, 255, 0.3); user-select: none;
        }

        /* --- 2. MAIN CONTAINER --- */
        .container { 
            width: 95vw; max-width: 600px; 
            background-color: var(--sz-panel); 
            border: 2px solid #333;
            padding: 25px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.9);
            position: relative;
            margin-bottom: 20px;
        }
        /* Corner Screws */
        .container::before, .container::after {
            content: ''; position: absolute; width: 8px; height: 8px; 
            border-radius: 50%; background: #222; border: 2px solid #444;
            box-shadow: inset 1px 1px 2px #000;
        }
        .container::before { top: 8px; left: 8px; } 
        .container::after { top: 8px; right: 8px; }

        /* --- 3. HEADER --- */
        #custom-header { 
            font-family: 'NIN', sans-serif; text-align: left; margin-bottom: 25px; 
            font-size: 2em; line-height: 1; letter-spacing: 2px; color: var(--sz-cyan);
            border-bottom: 1px solid var(--sz-dim); padding-bottom: 10px;
        }
        #blinking-cursor { animation: blink 1s step-end infinite; color: var(--sz-magenta); }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- 4. CONTROLS --- */
        .deck-section {
            margin-bottom: 15px;
            border: 1px solid #2a2b30;
            background: rgba(0,0,0,0.3);
            padding: 10px;
        }
        .deck-label {
            font-size: 10px; color: var(--sz-cyan); margin-bottom: 8px; 
            text-transform: uppercase; letter-spacing: 1px; display: block;
        }

        .row { display: flex; gap: 10px; align-items: center; justify-content: space-between; }
        .full { width: 100%; }

        button, .file-btn {
            font-family: 'DATA', monospace; background: #15161a; color: var(--sz-cyan);
            border: 1px solid var(--sz-dim); padding: 10px; font-size: 14px; cursor: pointer;
            text-transform: uppercase; text-align: center; transition: all 0.2s;
            flex: 1;
        }
        button:hover:not(:disabled) { 
            background: var(--sz-cyan); color: #000; 
            box-shadow: 0 0 10px var(--sz-cyan); border-color: var(--sz-cyan);
        }
        button:disabled { opacity: 0.3; cursor: not-allowed; border-color: #333; color: #555; }
        
        /* Specialized Inputs */
        input[type="number"] {
            background: #000; border: 1px solid var(--sz-dim); 
            color: var(--sz-cyan); font-family: 'DATA', monospace; 
            padding: 5px; width: 60px; text-align: center; font-size: 14px;
        }
        input[type="file"] { display: none; } /* Hidden, triggered by label */

        .data-display {
            background: #000; color: var(--sz-magenta);
            padding: 5px 10px; border: 1px solid #333;
            min-width: 60px; text-align: right;
        }

        .pitch-readout {
            font-size: 24px; color: #fff; font-weight: bold; width: 50px; text-align: center;
        }

        .status-bar {
            font-size: 10px; color: #666; margin-top: 5px; border-top: 1px solid #222; padding-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="custom-header">PITCH_SHIFT_UTIL<span id="blinking-cursor">_</span></div>
    
    <div class="deck-section">
        <span class="deck-label">01 // SOURCE_INGEST</span>
        <div class="row">
            <label for="audioFile" class="file-btn" id="fileInputLabel">[ LOAD FILE ]</label>
            <input type="file" id="audioFile" accept="audio/*">
            <button id="playOriginal" disabled>[ PLAY LOOP ]</button>
        </div>
    </div>

    <div class="deck-section">
        <span class="deck-label">02 // ANALYSIS_PARAMS</span>
        <div class="row">
            <div style="display:flex; align-items:center; gap:10px;">
                <label>BARS:</label>
                <input type="number" id="sampleBars" value="4" min="0.5" step="0.5">
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
                <label>DETECTED_BPM:</label>
                <div id="originalBPM" class="data-display">--</div>
            </div>
        </div>
    </div>

    <div class="deck-section">
        <span class="deck-label">03 // PITCH_ENGINE</span>
        <div class="row" style="justify-content: center; margin-bottom: 10px;">
            <button id="pitchDown" disabled style="max-width: 60px;">&lt;</button>
            <div id="pitchDisplay" class="pitch-readout">0</div>
            <button id="pitchUp" disabled style="max-width: 60px;">&gt;</button>
        </div>
        <div class="row" style="justify-content: flex-end;">
            <label style="color:var(--sz-text);">FINAL_BPM: </label>
            <div id="calculatedBPMDisplay" class="data-display" style="color:var(--sz-cyan); margin-left:10px;">--</div>
        </div>
    </div>

    <button id="exportButton" disabled class="full" style="border-color: var(--sz-magenta); color: var(--sz-magenta);">[ EXPORT WAV ]</button>
    
    <div class="status-bar">
        SYSTEM: READY // FORMULA: BPM_FINAL = BPM_ORIG + DELTA
    </div>
</div>

<script>
    // --- EXACT LOGIC PRESERVED FROM PREVIOUS VERSION ---
    let audioContext;
    let audioBuffer = null;
    let currentPitchBPM = 0; 
    let currentSourceNode = null; 
    let originalBPMValue = 0; 

    const audioFileInput = document.getElementById('audioFile');
    const playOriginalButton = document.getElementById('playOriginal');
    const pitchDownButton = document.getElementById('pitchDown');
    const pitchUpButton = document.getElementById('pitchUp');
    const exportButton = document.getElementById('exportButton');
    const pitchDisplay = document.getElementById('pitchDisplay');
    const sampleBarsInput = document.getElementById('sampleBars'); 
    const originalBPMDisplay = document.getElementById('originalBPM');
    const calculatedBPMDisplay = document.getElementById('calculatedBPMDisplay');
    const fileLabel = document.getElementById('fileInputLabel');

    function initAudioContext() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function guessBarsFromDuration(duration) {
        if (duration <= 0) return 4;
        const commonBars = [1, 2, 4, 8];
        const commonBPMs = [70, 80, 90, 100, 110, 120, 128, 130, 140, 150, 160];
        let bestGuess = 4;
        let minDifference = Infinity;
        for (const bars of commonBars) {
            const calculatedBPM = (240 * bars) / duration;
            for (const roundBPM of commonBPMs) {
                const difference = Math.abs(calculatedBPM - roundBPM);
                if (difference < minDifference) {
                    minDifference = difference;
                    bestGuess = bars;
                }
            }
        }
        return bestGuess;
    }

    function calculateOriginalBPM() {
        if (!audioBuffer) {
            originalBPMValue = 0;
            originalBPMDisplay.textContent = '--';
            return 0;
        }
        const duration = audioBuffer.duration;
        const bars = parseFloat(sampleBarsInput.value) || 4; 
        const bpm = (240 * bars) / duration; 
        originalBPMValue = bpm;
        originalBPMDisplay.textContent = bpm.toFixed(2);
        return bpm;
    }

    function getPlaybackRate() {
        const originalBPM = originalBPMValue || 120; 
        const newBPM = originalBPM + currentPitchBPM;
        return Math.max(0.1, newBPM / originalBPM);
    }

    function updateCalculatedBPM() {
        const originalBPM = originalBPMValue || 120;
        const calculatedBPM = originalBPM + currentPitchBPM;
        calculatedBPMDisplay.textContent = calculatedBPM.toFixed(2);
    }

    function updateControls(bufferLoaded) {
        const isReady = bufferLoaded && audioBuffer;
        const isPlaying = currentSourceNode !== null;
        pitchDownButton.disabled = !isReady;
        pitchUpButton.disabled = !isReady;
        exportButton.disabled = !isReady;
        playOriginalButton.disabled = !isReady;
        
        if (isPlaying) {
            playOriginalButton.textContent = "[ STOP LOOP ]";
            playOriginalButton.style.borderColor = "var(--sz-magenta)";
        } else {
            playOriginalButton.textContent = "[ PLAY LOOP ]";
            playOriginalButton.style.borderColor = "";
        }
        
        pitchDisplay.textContent = (currentPitchBPM > 0 ? "+" : "") + currentPitchBPM;
        calculateOriginalBPM();
        updateCalculatedBPM();
    }

    function bufferToWav(audioBuffer) {
        const numOfChan = audioBuffer.numberOfChannels;
        const sampleRate = audioBuffer.sampleRate;
        const buffers = [];
        let bufferLength = 0;
        for (let i = 0; i < numOfChan; i++) {
            const channelData = audioBuffer.getChannelData(i);
            buffers.push(channelData);
            if (i === 0) bufferLength = channelData.length;
        }
        const bytesPerSample = 2; 
        const blockAlign = numOfChan * bytesPerSample;
        const byteRate = sampleRate * blockAlign;
        const dataSize = bufferLength * numOfChan * bytesPerSample;
        const arrayBuffer = new ArrayBuffer(44 + dataSize);
        const view = new DataView(arrayBuffer);
        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }
        writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + dataSize, true); writeString(view, 8, 'WAVE'); 
        writeString(view, 12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, numOfChan, true); 
        view.setUint32(24, sampleRate, true); view.setUint32(28, byteRate, true); view.setUint16(32, blockAlign, true); view.setUint16(34, 16, true); 
        writeString(view, 36, 'data'); view.setUint32(40, dataSize, true); 
        let offset = 44;
        for (let i = 0; i < bufferLength; i++) {
            for (let channel = 0; channel < numOfChan; channel++) {
                const s = Math.max(-1, Math.min(1, buffers[channel][i]));
                const val = s < 0 ? s * 0x8000 : s * 0x7FFF;
                view.setInt16(offset, val, true);
                offset += 2;
            }
        }
        return new Blob([view], { type: 'audio/wav' });
    }

    audioFileInput.addEventListener('change', async (event) => {
        initAudioContext();
        const file = event.target.files[0];
        if (!file) return;
        fileLabel.textContent = `[ ${file.name.substring(0, 12)}... ]`;
        
        if (currentSourceNode) { currentSourceNode.stop(); currentSourceNode = null; }
        originalBPMDisplay.textContent = '...';
        updateControls(false);
        const arrayBuffer = await file.arrayBuffer();
        try {
            audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            sampleBarsInput.value = guessBarsFromDuration(audioBuffer.duration);
            currentPitchBPM = 0;
            updateControls(true);
        } catch (e) {
            alert("DECODE_FAIL");
            updateControls(false);
        }
    });

    sampleBarsInput.addEventListener('input', () => {
        updateControls(true); 
        if (currentSourceNode) { playOriginalButton.click(); playOriginalButton.click(); }
    });

    pitchUpButton.addEventListener('click', () => {
        currentPitchBPM++; 
        updateControls(true);
        if (currentSourceNode) { playOriginalButton.click(); playOriginalButton.click(); }
    });

    pitchDownButton.addEventListener('click', () => {
        currentPitchBPM--; 
        updateControls(true);
        if (currentSourceNode) { playOriginalButton.click(); playOriginalButton.click(); }
    });

    playOriginalButton.addEventListener('click', () => {
        if (!audioBuffer) return;
        if (currentSourceNode) {
            currentSourceNode.stop();
            currentSourceNode = null;
            updateControls(true);
            return;
        }
        const rate = getPlaybackRate();
        const source = audioContext.createBufferSource();
        source.buffer = audioBuffer;
        source.playbackRate.value = rate; 
        source.loop = true; 
        source.connect(audioContext.destination);
        source.start(0);
        currentSourceNode = source;
        updateControls(true);
    });

    exportButton.addEventListener('click', async () => {
        if (!audioBuffer) return;
        exportButton.textContent = "PROCESSING...";
        exportButton.disabled = true;
        try {
            const rate = getPlaybackRate();
            const newDuration = audioBuffer.duration / rate;
            const offlineContext = new OfflineAudioContext(
                audioBuffer.numberOfChannels,
                Math.ceil(newDuration * audioContext.sampleRate),
                audioContext.sampleRate
            );
            const source = offlineContext.createBufferSource();
            source.buffer = audioBuffer;
            source.playbackRate.value = rate; 
            source.connect(offlineContext.destination);
            source.start(0);
            const renderedBuffer = await offlineContext.startRendering();
            const wavBlob = bufferToWav(renderedBuffer);
            const url = URL.createObjectURL(wavBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `SZ_PITCH_${(originalBPMValue + currentPitchBPM).toFixed(0)}BPM.wav`;
            a.click();
            URL.revokeObjectURL(url);
        } finally {
            exportButton.textContent = "[ EXPORT WAV ]";
            updateControls(true);
        }
    });

    updateControls(false);
</script>
</body>
</html>
